name: Create OCI Instance

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: create-oci-instance
  cancel-in-progress: true

jobs:
  create-instance:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Keep alive - touch timestamp
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          echo $(date -u +"%Y-%m-%dT%H:%M:%SZ") > .last_run
          git add .last_run
          git diff --staged --quiet || git commit -m "ci: keep-alive $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          git push
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write OCI config
        env:
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_private_key.pem
          chmod 600 ~/.oci/oci_api_private_key.pem
          KEY_FILE="$HOME/.oci/oci_api_private_key.pem"
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s\n' \
            "$OCI_USER_ID" "$OCI_KEY_FINGERPRINT" "$OCI_TENANCY_ID" "$OCI_REGION" "$KEY_FILE" \
            > oci_config

      - name: Write oci.env
        env:
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_DISPLAY_NAME: ${{ secrets.OCI_DISPLAY_NAME }}
          OCT_FREE_AD: ${{ secrets.OCI_AVAILABILITY_DOMAINS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          WORKDIR=$(pwd)
          printf 'OCI_CONFIG=%s/oci_config\nOCT_FREE_AD=%s\nDISPLAY_NAME=%s\nOCI_SUBNET_ID=%s\nOCI_IMAGE_ID=%s\nSSH_AUTHORIZED_KEYS_FILE=%s/id_rsa.pub\nOCI_COMPUTE_SHAPE=VM.Standard.A1.Flex\nREQUEST_WAIT_TIME_SECS=10\nTELEGRAM_TOKEN=%s\nTELEGRAM_USER_ID=%s\n' \
            "$WORKDIR" "$OCT_FREE_AD" "$OCI_DISPLAY_NAME" "$OCI_SUBNET_ID" "$OCI_IMAGE_ID" \
            "$WORKDIR" "$TELEGRAM_TOKEN" "$TELEGRAM_USER_ID" \
            > oci.env
          printf '%s\n' "$OCI_SSH_PUBLIC_KEY" > id_rsa.pub

      - name: Debug config files
        run: |
          echo "=== oci_config ===" && cat oci_config
          echo "=== oci.env ===" && cat oci.env
          echo "=== PEM first line ===" && head -1 ~/.oci/oci_api_private_key.pem

      - name: Run instance creation script
        run: python main.py

      - name: Check if instance was created
        run: |
          if [ -f INSTANCE_CREATED ]; then
            echo "SUCCESS: Instance created!"
            cat INSTANCE_CREATED
          else
            echo "No instance created this run (out of capacity, will retry)"
          fi
